<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Object Detection - iPhone 8 Plus</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background: #000;
            color: #fff;
            text-align: center;
        }

        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 640px;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #status {
            padding: 10px;
            color: #00ff00;
        }
    </style>
</head>

<body>
    <h1>AI Real-time Detection</h1>
    <div id="status">Đang tải mô hình AI...</div>

    <div class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const status = document.getElementById('status');
        let model;

        // 1. Khởi tạo Camera
        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: 640, height: 640 },
                audio: false
            });
            video.srcObject = stream;
            return new Promise(resolve => video.onloadedmetadata = () => resolve());
        }

        // 2. Chạy nhận diện
        async function predict() {
            // Giải phóng bộ nhớ mỗi vòng lặp
            tf.engine().startScope();

            // Thay đổi: Sử dụng tf.tidy để dọn dẹp bộ nhớ tốt hơn cho iPhone 8 Plus
            const img = tf.tidy(() => {
                return tf.browser.fromPixels(video)
                    .resizeBilinear([640, 640]) // Dùng Bilinear thay vì Nearest để ảnh mượt hơn
                    .expandDims(0)
                    .div(255.0);
            });

            try {
                // Thực hiện dự đoán
                const result = await model.executeAsync(img); // Dùng executeAsync thay vì predict
        
                // Log thử kết quả ra màn hình điện thoại để kiểm tra
                // status.innerText = "Đang nhận diện: " + result.shape; 

                // Giải phóng kết quả sau khi dùng
                if (Array.isArray(result)) {
                    result.forEach(t => t.dispose());
                } else {
                    result.dispose();
                }
            } catch (error) {
                status.innerText = "Lỗi dự đoán: " + error.message;
            }

            tf.engine().endScope();
            requestAnimationFrame(predict);
        }

        async function main() {
            try {
                // Tải mô hình từ thư mục cục bộ
                model = await tf.loadGraphModel('model.json');
                status.innerText = "Mô hình đã sẵn sàng! Đang mở Camera...";
                await setupCamera();
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                predict();
            } catch (e) {
                status.innerText = "Lỗi: " + e.message;
            }
        }

        main();
    </script>
</body>

</html>
