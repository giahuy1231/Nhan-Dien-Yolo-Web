<!DOCTYPE html>
<html>
<head>
    <title>YOLOv8 ONNX - iPhone 8 Plus</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; text-align: center; font-family: sans-serif; }
        video { width: 100%; max-width: 640px; border-radius: 10px; }
        .container { position: relative; display: inline-block; }
        #status { padding: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>AI Object Detection (ONNX)</h1>
    <div id="status">Đang khởi tạo hệ thống...</div>
    <div class="container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const status = document.getElementById('status');
        let session;

        async function main() {
            try {
                status.innerText = "Đang tải mô hình ONNX (vui lòng đợi)...";
                // 1. Nạp mô hình ONNX
                session = await ort.InferenceSession.create('./best.onnx', { 
                    executionProviders: ['wasm'] 
                });
                
                status.innerText = "Đang mở Camera...";
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 640, height: 640 },
                    audio: false
                });
                video.srcObject = stream;
                
                status.innerText = "AI đang chạy!";
                predict();
            } catch (e) {
                status.innerText = "Lỗi hệ thống: " + e.message;
            }
        }

        async function predict() {
            // Xử lý đơn giản để kiểm tra xem mô hình có sống không
            // (Phần này chỉ để xác nhận không còn lỗi Shape)
            setTimeout(() => requestAnimationFrame(predict), 200);
        }

        main();
    </script>
</body>
</html>
