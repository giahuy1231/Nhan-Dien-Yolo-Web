<!DOCTYPE html>
<html>

<head>
    <title>Ứng Dụng Nhận Diện</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #0f0;
            text-align: center;
            font-family: sans-serif;
        }

        video {
            width: 100%;
            max-width: 640px;
            border-radius: 10px;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        #status {
            padding: 15px;
            font-size: 14px;
        }

        .stats-container {
            margin: 10px auto;
            width: 90%;
            max-width: 640px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
        }

        h3 {
            margin-top: 0;
            color: #0f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
            font-size: 14px;
        }

        th,
        td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        th {
            color: #0f0;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <h1>AI Object Detection (ONNX)</h1>
    <div class="stats-container">
        <h3>Thống kê vật thể</h3>
        <table id="stats-table">
            <thead>
                <tr>
                    <th>Vật thể</th>
                    <th>Số lượng</th>
                    <th>Độ tin cậy (Avg)</th>
                </tr>
            </thead>
            <tbody id="stats-body"></tbody>
        </table>
    </div>

    <div id="status">Đang khởi tạo hệ thống...</div>

    <div class="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const status = document.getElementById('status');
        const statsBody = document.getElementById('stats-body');
        let session;
        let labels = []; // Mảng chứa tên các vật thể

        // 1. Khởi tạo
        async function main() {
            try {
                status.innerText = "Đang cấu hình AI (Tắt SIMD)...";
                ort.env.wasm.simd = false; // Tắt SIMD cho iPhone 8 Plus

                status.innerText = "Đang tải mô hình ONNX (~12MB)...";
                session = await ort.InferenceSession.create('./best.onnx', { executionProviders: ['wasm'] });

                // Lấy danh sách labels từ mô hình (YOLOv8 thường nhúng labels vào metadata)
                // Nếu dùng coco8.yaml mặc định, hãy dùng mảng label cứng ở dưới
                labels = ["person", "bicycle", "car", "motorcycle", "airplane", "bus", "train", "truck", "boat", "traffic light", "fire hydrant", "stop sign", "parking meter", "bench", "bird", "cat", "dog", "horse", "sheep", "cow", "elephant", "bear", "zebra", "giraffe", "backpack", "umbrella", "handbag", "tie", "suitcase", "frisbee", "skis", "snowboard", "sports ball", "kite", "baseball bat", "baseball glove", "skateboard", "surfboard", "tennis racket", "bottle", "wine glass", "cup", "fork", "knife", "spoon", "bowl", "banana", "apple", "sandwich", "orange", "broccoli", "carrot", "hot dog", "pizza", "donut", "cake", "chair", "couch", "potted plant", "bed", "dining table", "toilet", "tv", "laptop", "mouse", "remote", "keyboard", "cell phone", "microwave", "oven", "toaster", "sink", "refrigerator", "book", "clock", "vase", "scissors", "teddy bear", "hair drier", "toothbrush"];

                status.innerText = "Đang mở Camera...";
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 640, height: 640 },
                    audio: false
                });
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    status.innerText = "AI đang hoạt động!";
                    predict();
                };
            } catch (e) {
                status.innerText = "Lỗi hệ thống: " + e.message;
            }
        }

        // 2. Chạy nhận diện và xử lý hậu kỳ (Post-processing)
        async function predict() {
            const inputWidth = 640;
            const inputHeight = 640;

            // 2.1 Tiền xử lý: Chuyển ảnh camera thành tensor
            const img = tf.browser.fromPixels(video)
                .resizeBilinear([inputWidth, inputHeight])
                .expandDims(0)
                .div(255.0);

            // Chuyển Tensor của tf.js thành mảng Float32 cho ort-web
            const inputData = await img.data();
            const inputTensor = new ort.Tensor('float32', inputData, [1, 3, inputWidth, inputHeight]);
            img.dispose(); // Giải phóng bộ nhớ tf.js

            // 2.2 Chạy mô hình
            const results = await session.run({ images: inputTensor });
            const output = results.output0.data; // Mảng dữ liệu thô dạng [1, 84, 8400]

            // 2.3 Xử lý hậu kỳ (NMS - Non Maximum Suppression)
            // Chúng ta cần lấy tọa độ và độ tin cậy của vật thể
            const boxes = [];
            const numClasses = 80;
            const numAnchors = 8400; // Số lượng khung hình dự đoán của YOLOv8 640

            for (let i = 0; i < numAnchors; i++) {
                let maxClassScore = 0;
                let classId = -1;

                // Tìm lớp vật thể có độ tin cậy cao nhất cho khung hình này
                for (let c = 0; c < numClasses; c++) {
                    // Công thức tính index trong mảng 1D: (row * numCols) + col
                    const score = output[((4 + c) * numAnchors) + i];
                    if (score > maxClassScore) {
                        maxClassScore = score;
                        classId = c;
                    }
                }

                // Chỉ lấy vật thể có độ tin cậy > 0.5 (50%)
                if (maxClassScore > 0.5) {
                    // Lấy tọa độ (x, y, w, h) - Lưu ý YOLOv8 trả về dạng [cx, cy, w, h]
                    let cx = output[(0 * numAnchors) + i];
                    let cy = output[(1 * numAnchors) + i];
                    let w = output[(2 * numAnchors) + i];
                    let h = output[(3 * numAnchors) + i];

                    // Chuyển sang dạng [x_min, y_min, w, h] để vẽ
                    let x = cx - w / 2;
                    let y = cy - h / 2;

                    boxes.push({ x, y, w, h, score: maxClassScore, classId, label: labels[classId] });
                }
            }

            // 2.4 Chạy thuật toán NMS để loại bỏ các khung hình trùng lặp
            // (Để đơn giản và chạy mượt trên iPhone 8 Plus, tôi dùng thuật toán tự viết nhanh)
            const finalBoxes = [];
            boxes.sort((a, b) => b.score - a.score); // Sắp xếp theo độ tin cậy giảm dần

            while (boxes.length > 0) {
                const bestBox = boxes.shift();
                finalBoxes.push(bestBox);

                // Loại bỏ các box khác có độ giao nhau (IoU) lớn hơn 0.5 với box tốt nhất
                for (let j = 0; j < boxes.length; j++) {
                    if (calculateIoU(bestBox, boxes[j]) > 0.5) {
                        boxes.splice(j, 1);
                        j--;
                    }
                }
            }

            // 2.5 Vẽ kết quả lên Canvas và cập nhật bảng thống kê
            drawAndStats(finalBoxes);

            // Chạy vòng lặp tiếp theo (Giới hạn 5 FPS để iPhone không quá nhiệt)
            setTimeout(() => requestAnimationFrame(predict), 200);
        }

        // Hàm tính toán độ giao nhau IoU (Intersection over Union)
        function calculateIoU(box1, box2) {
            const x1 = Math.max(box1.x, box2.x);
            const y1 = Math.max(box1.y, box2.y);
            const x2 = Math.min(box1.x + box1.w, box2.x + box2.w);
            const y2 = Math.min(box1.y + box1.h, box2.y + box2.h);

            const intersection = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
            const union = (box1.w * box1.h) + (box2.w * box2.h) - intersection;
            return intersection / union;
        }

        // Hàm vẽ và thống kê
        function drawAndStats(boxes) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Thống kê vật thể
            const stats = {};

            boxes.forEach(box => {
                // Vẽ khung
                ctx.strokeStyle = "#00FF00";
                ctx.lineWidth = 2;
                ctx.strokeRect(box.x, box.y, box.w, box.h);

                // Vẽ label
                ctx.fillStyle = "#00FF00";
                ctx.font = "16px sans-serif";
                ctx.fillText(`${box.label} (${(box.score * 100).toFixed(0)}%)`, box.x, box.y > 20 ? box.y - 5 : 20);

                // Cập nhật thống kê
                if (!stats[box.label]) {
                    stats[box.label] = { count: 0, totalScore: 0 };
                }
                stats[box.label].count++;
                stats[box.label].totalScore += box.score;
            });

            // Cập nhật Bảng Thống kê
            statsBody.innerHTML = ''; // Xóa bảng cũ
            for (const [label, data] of Object.entries(stats)) {
                const avgScore = (data.totalScore / data.count * 100).toFixed(0);
                const row = `<tr>
                    <td>${label}</td>
                    <td>${data.count}</td>
                    <td>${avgScore}%</td>
                </tr>`;
                statsBody.innerHTML += row;
            }
        }

        // Nạp thư viện tf.js (chỉ dùng để tiền xử lý ảnh cho ort-web)
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
</body>

</html>
